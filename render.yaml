# Render.com Blueprint — deploy FastAPI app.
# Docs: https://render.com/docs/blueprint-spec

# Postgres để dữ liệu KHÔNG bị mất mỗi lần deploy (khác với SQLite trên đĩa tạm).
databases:
  - name: tin10-db
    plan: free
    region: singapore

services:
  - type: web
    name: tin10-canhdieu
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true   # Render sinh secret ngẫu nhiên, không hardcode
      # Lấy connection string của Postgres ở trên, gán vào DATABASE_URL.
      # app/db.py đọc biến này; nếu không có thì fallback SQLite (chỉ dùng local).
      - key: DATABASE_URL
        fromDatabase:
          name: tin10-db
          property: connectionString
