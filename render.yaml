# Render.com Blueprint — deploy FastAPI app.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tin10-canhdieu
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true   # Render sinh secret ngẫu nhiên, không hardcode
